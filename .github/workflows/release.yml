name: Release

on:
  push:
    branches:
      - main # Bumps version and releases on every push to main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to calculate the next version tag

      - name: Bump version and push tag
        id: tag_version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch # Options: patch, minor, major. Reads #major, #minor, #patch from commit messages.

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build Python package
        run: uv build --out-dir dist

      - name: Build standalone binary
        run: |
          uv run pyinstaller \
            --name voice-to-text \
            --onefile \
            src/voice_to_text/main.py \
            --distpath dist \
            --clean

      - name: Pack GNOME extension
        run: |
          UUID="voice-to-text@happytomatoe.com"
          SRC="gnome-ext"
          rm -rf "dist/$UUID"
          mkdir -p "dist/$UUID/schemas"
          VERSION_NUM=$(echo "${{ steps.tag_version.outputs.new_tag }}" | sed 's/^v//')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION_NUM\"/g" "$SRC"/metadata.json

          cp "$SRC"/*.js "$SRC"/*.json "$SRC"/*.css "dist/$UUID/"
          cp "$SRC"/schemas/*.xml "dist/$UUID/schemas/"
          cp "$SRC"/metadata.json "dist/$UUID/"
          glib-compile-schemas "dist/$UUID/schemas/"
          cd "dist/$UUID" && zip -r "../$UUID.shell-extension.zip" ./*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }} # Uses the automatically generated tag
          files: |
            dist/voice_to_text-*.whl
            dist/voice_to_text-*.tar.gz
            dist/voice-to-text
            dist/voice-to-text@happytomatoe.com.shell-extension.zip
          generate_release_notes: true
