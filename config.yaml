# groq-voice configuration
# Multi-provider transcription system

# Provider selection
transcription:
  provider: "voxtral_realtime" # "groq", "voxtral", or "voxtral_realtime"
  language: "en"

# Provider-specific configurations
groq:
  api_key_env: "GROQ_API_KEY"

voxtral:
  api_key_env: "VOXTRAL_API_KEY"
  model: "voxtral-mini-latest"

voxtral_realtime:
  api_key_env: "VOXTRAL_API_KEY"
  realtime_model: "voxtral-mini-transcribe-realtime-2602"
  target_delay_ms: 400

audio:
  sample_rate: 16000
  channels: 1
  block_size: 2048
  smooth_factor: 0.7

logging:
  file: "/var/home/l/git/voice-to-text/voice-to-text.log"
  level: "info"
