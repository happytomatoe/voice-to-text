# groq-voice configuration
# Multi-provider transcription system

# Provider selection
transcription:
  provider: "voxtral" # "deepgram", "groq", "voxtral", or "parakeet"
  language: "en"

# Provider-specific configurations
deepgram:
  api_key_env: "DEEPGRAM_API_KEY"
  model: "nova-3"

groq:
  api_key_env: "GROQ_API_KEY"

voxtral:
  api_key_env: "VOXTRAL_API_KEY"
  model: "voxtral-mini-latest"

parakeet:
  model: "nvidia/parakeet-tdt-0.6b-v3"
  http_endpoint: "http://localhost:5092"
  timeout_seconds: 30

audio:
  sample_rate: 16000
  channels: 1
  block_size: 2048
  smooth_factor: 0.7
  speaker:
    decrease_volume: 50  # 0-100: % to decrease speaker volume when recording (0=no change, 100=mute)

logging:
  file: "/tmp/voice-to-text.log"
  level: "info"
