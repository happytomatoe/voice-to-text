# groq-voice configuration
# Multi-provider transcription system

# Provider selection
transcription:
  mode: "batch"           # "batch", "hybrid", or "streaming"
  provider: "voxtral"   # batch: "deepgram", "groq", "voxtral", "parakeet", or "elevenlabs"
  language: "en"
  hybrid:
    streaming_provider: "voxtral"
    batch_provider: "voxtral"

# Provider-specific configurations
deepgram:
  api_key_source: "keyring"
  model: "nova-3"
  batch_options:
    smart_format: true
    punctuate: true
    numerals: true
    filler_words: false
    mip_opt_out: true
    detect_language: false
    multichannel: false
    paragraphs: false
    profanity_filter: false
    measurements: false
    dictation: false

groq:
  # api_key_source: "env" (default) or "keyring"
  # Add key: secret-tool store --label="Groq API key" application voice-to-text provider groq

voxtral:
  api_key_source: "keyring"
  model: "voxtral-mini-latest"
  realtime_model: "voxtral-mini-transcribe-realtime-2602"
  target_delay_ms: 400

sixty:
  api_key_env: "SIXTYDB_API_KEY"
  api_key_source: "keyring"

parakeet:
  model: "nvidia/parakeet-tdt-0.6b-v3"
  http_endpoint: "http://localhost:5092"
  timeout_seconds: 30

elevenlabs:
  api_key_env: "ELEVENLABS_API_KEY"
  model: "scribe_v2"          # scribe_v1, scribe_v2, scribe_v2_base, scribe_v3
  tag_audio_events: false     # true includes (laughter) etc. tags in the transcript

audio:
  sample_rate: 16000
  channels: 1
  block_size: 2048
  smooth_factor: 0.7
  # Auto-switch a connected Bluetooth headset to HSP/HFP and make its mic the
  # default source before recording. Set to false if you manage this yourself
  # (e.g. via WirePlumber or a udev rule) or don't use a BT headset.
  bluetooth_mic: true
  speaker:
    decrease_volume: 50  # 0-100: % to decrease speaker volume when recording (0=no change, 100=mute)

logging:
  file: "/tmp/voice-to-text.log"
  level: "info"

# Engine configuration
engine:
  stop_timeout: 120  # seconds to wait for transcription to complete after stop

# Performance profiling (logs timing for each startup step)
profiling: false
