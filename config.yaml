# groq-voice configuration
# Multi-provider transcription system

# Provider selection
transcription:
  mode: "batch"           # "batch", "hybrid", or "streaming"
  provider: "voxtral"   # For batch mode: "deepgram", "groq", "voxtral", or "parakeet"
  language: "en"
  hybrid:
    streaming_provider: "voxtral"
    batch_provider: "voxtral"

# Provider-specific configurations
deepgram:
  api_key_source: "keyring"
  model: "nova-3"
  batch_options:
    smart_format: true
    punctuate: true
    numerals: true
    filler_words: false
    mip_opt_out: true
    detect_language: false
    multichannel: false
    paragraphs: false
    profanity_filter: false
    measurements: false
    dictation: false

groq:
  api_key_source: "env"
  # Add key: secret-tool store --label="Groq API key" application voice-to-text provider groq

voxtral:
  api_key_source: "keyring"
  model: "voxtral-mini-latest"
  realtime_model: "voxtral-mini-transcribe-realtime-2602"
  target_delay_ms: 400

parakeet:
  model: "nvidia/parakeet-tdt-0.6b-v3"
  http_endpoint: "http://localhost:5092"
  timeout_seconds: 30

audio:
  sample_rate: 16000
  channels: 1
  block_size: 2048
  smooth_factor: 0.7
  speaker:
    decrease_volume: 50  # 0-100: % to decrease speaker volume when recording (0=no change, 100=mute)

logging:
  file: "/tmp/voice-to-text.log"
  level: "info"

# Engine configuration
engine:
  stop_timeout: 120  # seconds to wait for transcription to complete after stop

# Performance profiling (logs timing for each startup step)
profiling: false
