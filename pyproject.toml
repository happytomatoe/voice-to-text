[project]
name = "voice-to-text"
version = "0.1.0"
description = "Voice to Text using Groq Whisper and Voxtral APIs"
requires-python = ">=3.13"
dependencies = [
    "groq~=1.2.0",
    "sounddevice~=0.5.5",
    "numpy~=2.4.4",
    "pyyaml~=6.0.3",
    "python-dotenv~=1.2.2",
    "pyinstaller~=6.20.0",
    "requests~=2.33.1",
    "PyGObject>=3.48.0",
    "pycairo>=1.27.0",
    "evdev>=1.7.0",
]

[project.scripts]
voice-to-text = "voice_to_text.main:main"
ibus-engine-cloud = "ibus_cloud.__main__:main"
voice-daemon = "voice_daemon.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_to_text", "src/ibus_cloud", "src/voice_daemon"]

[project.optional-dependencies]
ibus = [
    "PyGObject>=3.48.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
ignore_missing_imports = true
