[project]
name = "voice-to-text"
version = "0.1.0"
description = "Voice to Text using Groq Whisper and Voxtral APIs"
requires-python = ">=3.13"
dependencies = [
    "groq~=1.2.0",
    "sounddevice~=0.5.5",
    "numpy~=2.4.4",
    "pyyaml~=6.0.3",
    "python-dotenv~=1.2.2",
    "pyinstaller~=6.20.0",
  "requests~=2.33.1"
]

[project.scripts]
voice-to-text = "groq_voice.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/groq_voice"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.mypy]
ignore_missing_imports = true
