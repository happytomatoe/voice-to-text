repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-sync
        name: uv sync
        entry: uv sync
        language: system
        pass_filenames: false
        always_run: true
      - id: eslint
        name: eslint
        entry: bash -lc 'npm ci 2>/dev/null || npm install 2>/dev/null; npx eslint --stdin --stdin-filename={staged_filename}'
        language: system
        types: [javascript]
        files: ^gnome-ext/.*\.js$
        pass_filenames: true
      - id: prettier-check
        name: prettier
        entry: npx prettier@3.8.4 --check
        language: system
        types: [text]
        files: ^gnome-ext/.*\.(js|css|json)$
        pass_filenames: true
      - id: pytest
        name: pytest
        entry: uv run pytest -n auto
        language: system
        types: [python]
        files: ^(tests/|src/)
        pass_filenames: false
      - id: no-co-authored-by
        name: no Co-Authored-By trailer
        entry: bash scripts/no-co-authored-by.sh
        language: system
        stages: [commit-msg]
        pass_filenames: true
