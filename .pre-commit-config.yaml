repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'PYTHONDONTWRITEBYTECODE=1 uv run pytest "$@"' --
        language: system
        pass_filenames: false
        always_run: true
      - id: pyright
        name: pyright
        entry: uv run pyright src/
        language: system
        pass_filenames: false
        always_run: true
# test
